ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    # Frame definitions
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # Robot's ground-projection reference link
    world_frame: odom           # Fuses local sensors; publishes odom -> base_footprint TF

    # Fused Odometry Configuration Matrix:
    # [x,  y,  z,
    #  r,  p,  yaw,
    #  vx, vy, vz,
    #  vr, vp, vyaw,
    #  ax, ay, az]

    # 1. Noisy Wheel Odometry
    odom0: /odom_noisy
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # 2. IMU Sensor
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false,  false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    # 3. Visual Odometry (Camera)
    # odom1: /visual_odom
    # odom1_config: [false, false, false,
    #                false, false, false,
    #                true,  true,  false,
    #                false, false, true,
    #                false, false, false]
    # odom1_differential: false
    # odom1_relative: false
    # odom1_queue_size: 10

    # Process Noise Covariance (Q-matrix)
    # Diagonals represent expected variance due to random physical forces per second.
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06, 0.025, 0.025, 0.04, 0.01, 0.01, 0.02, 0.01, 0.01, 0.015]

    # Initial Estimate Covariance (P-matrix)
    # The starting uncertainty of the robot's position (set extremely low on startup).
    initial_estimate_covariance: [1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9, 1e-9]
