name: ROS 2 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ros-jazzy-ros-gz ros-jazzy-foxglove-bridge ros-jazzy-robot-localization ros-jazzy-ros2-control ros-jazzy-ros2-controllers ros-jazzy-gz-ros2-control ros-jazzy-slam-toolbox ros-jazzy-rtabmap-odom
          rosdep update
          rosdep install --from-paths src --ignore-src -y --rosdistro jazzy

      - name: Build Workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --symlink-install --event-handlers console_direct+
